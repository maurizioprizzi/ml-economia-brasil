name: CI — Testes e qualidade de código

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancela runs anteriores ainda em progresso para a mesma branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: "lint + testes (${{ matrix.project }} · Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # todos os jobs rodam mesmo se um falhar
      matrix:
        python-version: ["3.10", "3.11"]
        project:
          - projeto-01-ipca
          - projeto-02-pib
          - projeto-03-desemprego

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura Python com cache de pip
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      # 3. Instala apenas dependências leves
      #    O CI não precisa de TensorFlow, XGBoost, Streamlit, etc.
      #    Esses são instalados localmente via requirements.txt completo.
      - name: Instalar dependências de CI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # 4. Verifica formatação com Black (aviso, não bloqueia)
      - name: "Black — verificar formatação"
        run: |
          echo "Verificando ${{ matrix.project }}/src/"
          black --check --diff ${{ matrix.project }}/src/ \
            || echo "::warning::Código fora do padrão Black — rode: black ${{ matrix.project }}/src/"

      # 5. Lint com Flake8 (aviso, não bloqueia)
      - name: "Flake8 — lint"
        run: |
          echo "Verificando ${{ matrix.project }}/src/"
          flake8 ${{ matrix.project }}/src/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503,E203 \
            || echo "::warning::Avisos de lint encontrados — ver log acima"

      # 6. Testes unitários (passa mesmo sem testes ainda)
      - name: "Pytest — testes unitários"
        run: |
          echo "Executando testes em ${{ matrix.project }}/tests/"
          pytest ${{ matrix.project }}/tests/ \
            -v --tb=short --no-header -q \
            || echo "::notice::Nenhum teste encontrado ainda em ${{ matrix.project }}/tests/"

  # Job de resumo — aparece como check único no PR
  ci-ok:
    name: "CI concluído"
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: always()
    steps:
      - name: Resultado final
        run: |
          if [ "${{ needs.lint-and-test.result }}" = "success" ]; then
            echo "✅ Todos os checks passaram."
          else
            echo "⚠️  Alguns checks com avisos — verifique os jobs acima."
            echo "    (Erros de lint são avisos, não bloqueiam o merge)"
          fi